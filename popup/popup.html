<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=400" />
  <title>AI 标签分类</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <!-- ====== 顶部标题栏 ====== -->
    <header class="app-header">
      <h1 class="app-title">AI 标签分类</h1>
      <div class="header-actions">
        <button id="btnSettings" class="btn-icon" title="设置" aria-label="设置">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M19.14 12.94a7.07 7.07 0 0 0 .06-.94c0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z" fill="currentColor"/></svg>
        </button>
      </div>
    </header>

    <!-- ====== 网页基础信息区 ====== -->
    <section id="pageInfo" class="section page-info">
      <div class="page-title" id="pageTitle">—</div>
      <div class="page-url" id="pageUrl">—</div>
      <div class="page-meta">
        <span class="capture-time" id="captureTime"></span>
      </div>
    </section>

    <!-- ====== 加载状态 ====== -->
    <div id="loadingState" class="loading-state hidden">
      <div class="spinner"></div>
      <p class="loading-text">正在分析网页内容...</p>
    </div>

    <!-- ====== 错误状态 ====== -->
    <div id="errorState" class="error-state hidden">
      <div class="error-icon">⚠️</div>
      <p class="error-text" id="errorText">出错了</p>
      <div class="error-actions">
        <button id="btnRetry" class="btn btn-secondary">重试</button>
        <button id="btnGoSettings" class="btn btn-outline hidden">⚙️ 去设置</button>
      </div>
    </div>

    <!-- ====== 空状态 ====== -->
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">📄</div>
      <p class="empty-text">当前页面无可抓取内容</p>
    </div>

    <!-- ====== AI 智能标签区 ====== -->
    <section id="tagSection" class="section tag-section hidden">
      <div class="section-header">
        <h2 class="section-title">智能标签</h2>
        <button id="btnRegenerate" class="btn btn-sm btn-outline" title="重新生成">
          🔄 重新生成
        </button>
      </div>
      <div id="tagContainer" class="tag-container">
        <!-- 由 popup.js 动态渲染 -->
      </div>
      <div id="configHint" class="config-hint hidden">
        <span>⚙️</span>
        <span>配置 API Key 后可使用 AI 智能标签 — </span>
        <a id="configHintLink" href="#">去设置</a>
      </div>
      <div id="bookmarkHint" class="config-hint hidden">
        <span>⭐</span>
        <span>此网页未添加到收藏栏，</span>
        <a id="bookmarkHintLink" href="#">点此收藏</a>
        <span>以便后续批量处理</span>
      </div>
    </section>

    <!-- ====== 操作按钮区 ====== -->
    <footer class="app-footer">
      <button id="btnRefresh" class="btn btn-secondary" title="刷新抓取">
        🔄 刷新抓取
      </button>
      <button id="btnHistory" class="btn btn-secondary" title="历史记录">
        📋 历史记录
      </button>
      <button id="btnBookmarks" class="btn btn-secondary" title="收藏夹">
        📂 收藏夹
      </button>
      <button id="btnSave" class="btn btn-primary" title="保存标签">
        💾 保存
      </button>
    </footer>
  </div>

  <!-- ====== 历史记录弹窗（内联切换） ====== -->
  <div id="historyPanel" class="history-panel hidden">
    <div class="history-header">
      <h2 class="section-title">历史记录</h2>
      <button id="btnBack" class="btn-icon" title="返回" aria-label="返回">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/></svg>
      </button>
    </div>
    <div id="historyList" class="history-list">
      <!-- 由 popup.js 动态渲染 -->
    </div>
    <div class="history-footer">
      <button id="btnClearAll" class="btn btn-danger btn-sm">🗑 清空全部</button>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
